<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevOps Demo Application</title>

    <style>
        body{
            margin:0;
            padding:0;
            background:#0f172a;
            color:white;
            font-family:Arial, Helvetica, sans-serif;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .container{
            text-align:center;
            background:#1e293b;
            padding:50px;
            border-radius:15px;
            box-shadow:0px 0px 25px rgba(0,255,255,0.3);
        }

        h1{
            color:#38bdf8;
            font-size:42px;
        }

        h2{
            color:#22c55e;
        }

        p{
            font-size:18px;
            color: #d1d5db;
        }

        .badge{
            display:inline-block;
            margin-top:20px;
            padding:12px 20px;
            background:#2563eb;
            border-radius:8px;
            font-weight:bold;
        }

        footer{
            margin-top:30px;
            color:#94a3b8;
        }
    </style>

</head>

<body>

<div class="container">

    <h1>🚀 DevOps CI/CD Demo</h1>

    <h2>Successfully Deployed using Docker & GitHub Actions</h2>

    <p>
        This application is automatically deployed to an AWS EC2 instance
        using GitHub Actions, Docker, and Nginx.
    </p>

    <div class="badge">
        Docker | GitHub Actions | AWS EC2 | Nginx
    </div>

    <footer>

        <p><strong>Developed by:</strong> Tanisha Nikose</p>

    </footer>

</div>

</body>
</html>
